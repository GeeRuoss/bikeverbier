name: Deploy to GitHub Pages

# Build Astro + déploiement sur GitHub Pages à chaque push sur main.
# Le domaine custom (www.bikeverbier.ch) est défini par public/CNAME.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions nécessaires au déploiement Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois, sans annuler celui en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Astro et upload de l'artefact
        uses: withastro/action@v3
        with:
          node-version: 20

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déploiement sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
