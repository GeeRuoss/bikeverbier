# Garde-fou anti-fuite de secrets
# Scanne le repo à chaque push et chaque pull request.
# Bloque / alerte si un secret est détecté.
# Doc : https://github.com/gitleaks/gitleaks
name: Secrets Check

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  gitleaks:
    name: Scan gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Récupérer le code complet (historique inclus)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lancer gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: true
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
